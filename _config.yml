        title: Urdu Text Recognition from Scene Images
        additional_links:
          - title: GitHub
            icon: fab fa-github
            url: https://github.com/2016CS103
        quote: >
          Pioneering end-to-end Urdu text recognition for natural scene images. 98% character and 95% word recognition rate.
        description: |
          Developed end-to-end Urdu text recognition system addressing the lack of benchmark datasets. Created synthetic dataset (MUSID) with 16 million cropped word images across three fonts. Implemented deep learning architectures (CNN + BLSTM + CTC, InceptionV3, VGG-16, MobileNet). Expertise in computer vision, deep learning, and dataset generation for cursive script recognition.
      - layout: left
        title: Driver Behaviour Monitoring System
        quote: >
          Smartphone-based driver behavior monitoring to reduce road accidents. 95% validation accuracy.
        description: |
          Low-cost smartphone-based system for fleet management, insurance, and traffic regulation. Developed dataset of 18,000+ images across 11 distraction categories. 2D CNN with TensorFlow achieving 95% validation accuracy. Integrated into Android app using TensorFlow Lite. Real-time activity recognition and drowsiness alerts using smartphone sensors.
      - layout: left
        title: Classification of Diabetic Retinopathy Using Inception-V3
        quote: >
          Automated detection for diabetic retinopathy. 93.71% accuracy.
        description: |
          Automated detection system for diabetic retinopathy—a leading cause of blindness in diabetics. Classified retinal fundus images into five severity categories. Applied preprocessing, augmentation, and transfer learning with TensorFlow/Keras.
